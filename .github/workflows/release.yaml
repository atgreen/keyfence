name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binaries
        run: |
          mkdir -p dist
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              OUTPUT="dist/keyfence-${GOOS}-${GOARCH}"
              [ "$GOOS" = "windows" ] && OUTPUT="${OUTPUT}.exe"
              echo "Building ${GOOS}/${GOARCH}..."
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -ldflags="-s -w" -o "$OUTPUT" ./cmd/keyfence
            done
          done
          # Windows amd64 only
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w" -o dist/keyfence-windows-amd64.exe ./cmd/keyfence

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/keyfence-*
            dist/checksums.txt

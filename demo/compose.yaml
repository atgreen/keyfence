# KeyFence Demo
#
# Stand up KeyFence + an isolated agent container you can shell into.
# The agent has gh, git, and curl but NO direct internet access.
# All HTTPS goes through the KeyFence proxy.
# SSH git operations go through the KeyFence SSH bastion.
#
# Usage:
#   1. export GITHUB_TOKEN=ghp_your_real_pat
#   2. export KEYFENCE_API_KEY=$(openssl rand -hex 16)
#   3. ./setup.sh          # starts keyfence, issues token, drops you into a shell
#
#   Or manually:
#   4. podman-compose up -d keyfence
#   5. Issue a token via the control API
#   6. KEYFENCE_TOKEN=kf_... podman-compose run --rm agent

services:
  keyfence:
    build:
      context: ../
      dockerfile: Containerfile
    networks:
      - default              # outbound internet (reaches github.com)
      - agent-isolated       # reachable by agent container
    ports:
      - "10212:10212"        # control API (host-facing only)
    volumes:
      - keyfence-data:/data
      - keyfence-certs:/certs
    command: ["--data-dir", "/data", "--certs-dir", "/certs", "--api-key", "${KEYFENCE_API_KEY:?Set KEYFENCE_API_KEY}"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:10212/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  agent:
    build:
      context: .
      dockerfile: Containerfile.agent
    networks:
      - agent-isolated       # NO default network = no direct internet
    environment:
      - HTTPS_PROXY=http://keyfence:10210
      - SSL_CERT_FILE=/certs/ca.pem
      - GITHUB_TOKEN=${KEYFENCE_TOKEN:-kf_not_set}
      - GH_HOST=github.com
      - GIT_SSL_CAINFO=/certs/ca.pem
    volumes:
      - keyfence-certs:/certs:ro   # CA cert only -- no private key
      - ./demo.sh:/demo.sh:ro
    depends_on:
      keyfence:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: ["/bin/bash"]

networks:
  default: {}               # standard bridge -- has outbound routing
  agent-isolated:
    internal: true           # no default gateway -- agent cannot reach internet

volumes:
  keyfence-data:
  keyfence-certs:
